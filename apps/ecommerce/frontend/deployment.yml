apiVersion: apps/v1
kind: Deployment

metadata:
  name: ecommerce-frontend
  namespace: ecommerce

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ecommerce-frontend

  template:
    metadata:
      labels:
        app: ecommerce-frontend

    spec:
      containers:
        - name: ecommerce-frontend
          image: rajvam6806/e-commerce-frontend:7dd953c159aefc12d0e6c6d91d7ec25cdd783564

          imagePullPolicy: Always

          ports:
            - containerPort: 80

          env:
            - name: REACT_APP_API_URL
              value: "http://ecommerce-backend-service:8080"
