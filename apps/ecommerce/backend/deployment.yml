apiVersion: apps/v1
kind: Deployment

metadata:
  name: ecommerce-backend
  namespace: ecommerce

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ecommerce-backend

  template:
    metadata:
      labels:
        app: ecommerce-backend

    spec:
      imagePullSecrets:
      - name: dockerhub-secret
      containers:
      - name: ecommerce-backend

        image: rajvam6806/e-commerce-backend:b016d5ebfa8bb5a457b4bd6e34e202021367bdc9

        imagePullPolicy: Always

        ports:
        - containerPort: 8080