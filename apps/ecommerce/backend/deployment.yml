apiVersion: apps/v1
kind: Deployment

metadata:
  name: ecommerce-backend
  namespace: ecommerce

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ecommerce-backend

  template:
    metadata:
      labels:
        app: ecommerce-backend

    spec:
      imagePullSecrets:
        - name: dockerhub-secret

      containers:
        - name: ecommerce-backend

          image: rajvam6806/e-commerce-backend:3835b0088d55ab7703de024724ee79e5c9bf0e77

          imagePullPolicy: Always

          ports:
            - containerPort: 8080
