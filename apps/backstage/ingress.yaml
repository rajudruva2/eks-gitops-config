apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: backstage
  namespace: backstage

  annotations:
    kubernetes.io/ingress.class: nginx

spec:

  rules:
  - host: backstage.rajplatform.online

    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: backstage
            port:
              number: 80
