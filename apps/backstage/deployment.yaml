apiVersion: apps/v1
kind: Deployment

metadata:
  name: backstage
  namespace: backstage

  labels:
    app: backstage
    backstage.io/kubernetes-id: backstage

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backstage

  template:
    metadata:
      labels:
        app: backstage
        backstage.io/kubernetes-id: backstage

    spec:
      serviceAccountName: backstage-kubernetes

      containers:
        - name: backstage

          image: rajvam6806/backstage:6c7ffdb0c63e9cb2583450af84dd8ff418edbad0

          imagePullPolicy: Always

          ports:
            - containerPort: 7007

          envFrom:
            - secretRef:
                name: backstage-secret

            - secretRef:
                name: backstage-github-auth

          volumeMounts:
            - name: backstage-config
              mountPath: /app/app-config.production.yaml
              subPath: app-config.production.yaml

          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 7007

          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 7007

      volumes:
        - name: backstage-config
          configMap:
            name: backstage-config
