apiVersion: apps/v1
kind: Deployment

metadata:
  name: backstage
  namespace: backstage

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backstage

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%

  template:
    metadata:
      labels:
        app: backstage

    spec:
      containers:
        - name: backstage
          image: rajvam6806/backstage-platform:t1
          imagePullPolicy: Always

          command:
            - node

          args:
            - packages/backend
            - --config
            - /app/app-config.yaml

          ports:
            - containerPort: 7007

          env:
            - name: NODE_ENV
              value: development

            - name: APP_CONFIG_app_baseUrl
              value: "https://backstage.rajplatform.online"

            - name: APP_CONFIG_backend_baseUrl
              value: "https://backstage.rajplatform.online"

            - name: APP_CONFIG_backend_listen_port
              value: "7007"

            # PostgreSQL Configuration
            - name: APP_CONFIG_backend_database_client
              value: pg

            - name: APP_CONFIG_backend_database_connection_host
              value: postgres

            - name: APP_CONFIG_backend_database_connection_port
              value: "5432"

            - name: APP_CONFIG_backend_database_connection_user
              value: backstage

            - name: APP_CONFIG_backend_database_connection_password
              value: backstage

            - name: APP_CONFIG_backend_database_connection_database
              value: backstage_plugin_catalog

          volumeMounts:
            - name: backstage-config-volume
              mountPath: /app/app-config.yaml
              subPath: app-config.yaml

      volumes:
        - name: backstage-config-volume
          configMap:
            name: backstage-config
