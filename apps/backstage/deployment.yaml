apiVersion: apps/v1
kind: Deployment

metadata:
  name: backstage
  namespace: backstage

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backstage

  template:
    metadata:
      labels:
        app: backstage

    spec:
      containers:
        - name: backstage

          image: rajvam6806/backstage:7f1e7a4d50bdea36b0e2b86b5815bb0a2ee52014

          ports:
            - containerPort: 7007

          env:
            - name: NODE_ENV
              value: production

            - name: BACKSTAGE_NO_MIGRATION
              value: "true"     
          envFrom:
            - secretRef:
                name: backstage-secret

            - secretRef:
                name: backstage-github-auth    
