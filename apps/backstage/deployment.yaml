apiVersion: apps/v1
kind: Deployment

metadata:
  name: backstage
  namespace: backstage

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backstage

  template:
    metadata:
      labels:
        app: backstage

    spec:
      containers:
        - name: backstage

          image: rajvam6806/backstage:9c93e5d75929bbf7405a8a58e2a3ef7fc8d19dce

          ports:
            - containerPort: 7007

          env:
            - name: NODE_ENV
              value: production

            - name: BACKSTAGE_NO_MIGRATION
              value: "true"     
          envFrom:
            - secretRef:
                name: backstage-secret

            - secretRef:
                name: backstage-github-auth    
