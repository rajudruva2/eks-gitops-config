apiVersion: apps/v1
kind: Deployment

metadata:
  name: backstage
  namespace: backstage

spec:
  replicas: 1
  strategy:
    type: Recreate
  
  selector:
    matchLabels:
      app: backstage

  template:
    metadata:
      labels:
        app: backstage

    spec:
      serviceAccountName: backstage-kubernetes
      containers:
        - name: backstage

          image: rajvam6806/backstage:b03e0b2ce3c8f8a3d01ef1caa66546e2f8646b87

          ports:
            - containerPort: 7007

          env:
            - name: NODE_ENV
              value: production
            - name: BACKSTAGE_DB_MIGRATIONS_SKIP
              value: "true"
                
          envFrom:
            - secretRef:
                name: backstage-secret

            - secretRef:
                name: backstage-github-auth    
