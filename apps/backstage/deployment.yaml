apiVersion: apps/v1
kind: Deployment

metadata:
  name: backstage
  namespace: backstage

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backstage

  template:
    metadata:
      labels:
        app: backstage

    spec:
      containers:
        - name: backstage

          image: rajvam6806/backstage:a53f5af2901616fee76ec4519001540520ecc7a8

          ports:
            - containerPort: 7007

          env:
            - name: NODE_ENV
              value: production
          envFrom:
            - secretRef:
                name: backstage-secret

            - secretRef:
                name: backstage-github-auth    
