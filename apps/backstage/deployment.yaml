apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    deployment.kubernetes.io/revision: "23"
  labels:
    k8slens-edit-resource-version: v1
  name: backstage
  namespace: backstage
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: backstage
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      annotations:
      labels:
        app: backstage
    spec:
      containers:
      - args:
        - packages/backend
        - --config
        - app-config.yaml
        - --config
        - app-config.production.yaml
        - --config
        - app-config.k8s.yaml
        command:
        - node
        envFrom:
        - secretRef:
            name: backstage-secret
        image: rajvam6806/backstage-idp:v3
        imagePullPolicy: Always
        name: backstage
        ports:
        - containerPort: 7007
          protocol: TCP
        volumeMounts:
        - mountPath: /app/app-config.k8s.yaml
          name: backstage-config
          subPath: app-config.k8s.yaml
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      serviceAccount: backstage
      serviceAccountName: backstage
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: backstage-config
        name: backstage-config
