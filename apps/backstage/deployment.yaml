apiVersion: apps/v1
kind: Deployment

metadata:
  name: backstage
  namespace: backstage

spec:
  replicas: 1
  strategy:
    type: Recreate
  
  selector:
    matchLabels:
      app: backstage

  template:
    metadata:
      labels:
        app: backstage

    spec:
      serviceAccountName: backstage-kubernetes
      containers:
        - name: backstage

          image: rajvam6806/backstage:41771667894dd5e7eba681203faa8e54b16702ae

          ports:
            - containerPort: 7007

          env:
            - name: NODE_ENV
              value: production

                
          envFrom:
            - secretRef:
                name: backstage-secret

            - secretRef:
                name: backstage-github-auth    
