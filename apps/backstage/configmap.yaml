apiVersion: v1
kind: ConfigMap

metadata:
  name: backstage-config
  namespace: backstage

data:
  app-config.yaml: |
    app:
      title: Raj Platform
      baseUrl: https://backstage.rajplatform.online

    organization:
      name: Raj Platform

    backend:
      baseUrl: https://backstage.rajplatform.online

      listen:
        host: 0.0.0.0
        port: 7007

      cors:
        origin: https://backstage.rajplatform.online
        methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
        credentials: true
      reading:
        allow:
        - host: raw.githubusercontent.com
     
      auth:
        dangerouslyDisableDefaultAuthPolicy: true

      database:
        client: pg

        connection:
          host: postgres
          port: 5432
          user: backstage
          password: backstage123
          database: backstage

    auth:
      environment: development

      providers:
        guest: {}
          

    scaffolder: {}

    techdocs:
      builder: local

      generator:
        runIn: docker

      publisher:
        type: local

    catalog:
      rules:
        - allow:
            - Component
            - System
            - API
            - Resource
            - Location
            - Template
            - User
            - Group

      locations:
      - type: file
        target: ../../examples/entities.yaml

      - type: file
        target: ../../examples/org.yaml
        rules:
        - allow:
            - User
            - Group

      - type: file
        target: ../../examples/template/template.yaml
        rules:
        - allow:
            - Template 

       
    permission:
      enabled: false
