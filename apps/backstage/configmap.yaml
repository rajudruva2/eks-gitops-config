apiVersion: v1
kind: ConfigMap

metadata:
  name: backstage-config
  namespace: backstage

data:
  app-config.production.yaml: |
    app:
      baseUrl: https://backstage.rajplatform.online

    backend:
      baseUrl: https://backstage.rajplatform.online

      listen:
        port: 7007

      trustProxy: true

      cors:
        origin: https://backstage.rajplatform.online

      database:
        client: pg

        pluginDivisionMode: schema

        connection:
          host: postgres
          port: 5432
          user: ${POSTGRES_USER}
          password: ${POSTGRES_PASSWORD}

    # auth:
    #   environment: production

    #   providers:
    #     github:
    #       production:
    #         clientId: ${AUTH_GITHUB_CLIENT_ID}
    #         clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}
    #         signIn:
    #           resolvers:
    #           - resolver: usernameMatchingUserEntityName

    kubernetes:
      serviceLocatorMethod:
        type: multiTenant

      clusterLocatorMethods:
        - type: config
          clusters:
            - name: eks-dev
              url: https://kubernetes.default.svc
              authProvider: serviceAccount
              skipTLSVerify: true
