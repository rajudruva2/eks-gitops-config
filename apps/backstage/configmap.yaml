apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-config
  namespace: backstage
  labels:
    k8slens-edit-resource-version: v1
  annotations:
spec: {}
data:
  app-config.k8s.yaml: |
    app:
      title: Raj Platform
      baseUrl: https://backstage.rajplatform.online

    organization:
      name: Raj Platform

    integrations:
      github:
        - host: github.com
          token: ${GITHUB_TOKEN}

    catalog:
      locations:
        - type: file
          target: /app/examples/org.yaml
          rules:
          - allow: [User, Group]

        - type: file
          target: /app/examples/entities.yaml
           
        - type: file
          target: /app/examples/template/template.yaml
          rules:
          - allow: [Template]  

        - type: file
          target: ../../examples/entities.yaml

        - type: file
          target: ../../examples/template/template.yaml
          rules:
          - allow: [Template]

        - type: file
          target: ../../examples/org.yaml
          rules:
          - allow: [User, Group]

        - type: url
          target: https://github.com/rajudruva2/backstage-idp/blob/main/catalog-info.yaml

        - type: url
          target: https://github.com/rajudruva2/terraform-eks-eksctl/blob/main/catalog-info.yaml

        - type: url
          target: https://github.com/rajudruva2/e-commerce-backend/blob/main/catalog-info.yaml

        - type: url
          target: https://github.com/rajudruva2/e-commerce-frontend/blob/main/catalog-info.yaml

        - type: url
          target: https://github.com/rajudruva2/ems-backend/blob/main/catalog-info.yaml

        - type: url
          target: https://github.com/rajudruva2/ems-frontend/blob/main/catalog-info.yaml

        - type: url
          target: https://github.com/rajudruva2/eks-gitops-config/blob/main/catalog-info.yaml
        - type: url
          target: https://raw.githubusercontent.com/rajudruva2/backstage-idp/main/templates/springboot-app/template.yaml  
    kubernetes:
      serviceLocatorMethod:
        type: multiTenant

      clusterLocatorMethods:
        - type: config
          clusters:
            - name: dev-eks
              url: https://kubernetes.default.svc
              authProvider: serviceAccount
              caData: 
    permission:
      enabled: true

    mcpActions:
      name: Raj Platform Backstage
      description: Internal Developer Portal

