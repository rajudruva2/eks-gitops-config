apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: testapp10
  namespace: testapp10

  annotations:
    alb.ingress.kubernetes.io/group.name: rajplatform
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

spec:
  ingressClassName: alb

  rules:
  - host: testapp10.rajplatform.online

    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: testapp10

            port:
              number: 80
