apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet

metadata:
  name: apps-autodiscovery
  namespace: argocd

spec:
  generators:
  - git:
      repoURL: https://github.com/rajudruva2/eks-gitops-config.git
      revision: main
      directories:
      - path: apps/*

  template:
    metadata:
      name: '{{path.basename}}'

    spec:
      project: default

      source:
        repoURL: https://github.com/rajudruva2/eks-gitops-config.git
        targetRevision: main
        path: '{{path}}'

      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
